# nginx as the load balancer / router in front of the services.
#
# Each service is reached at its own /<service-id>/ prefix, which nginx strips
# before proxying (the trailing slash on proxy_pass), so the browser can call
# e.g. /service-1/health and it lands on service-1's /health. nginx matches the
# longest prefix, so adding more services never collides.
#
# The "Add service" button inserts a new upstream and a new location at the
# markers below — keep the marker comments in place.

events {}

http {
    # === upstreams (one per service; add `server` lines for replicas) ===
    upstream service-1 { server service-1:8000; }
    upstream payments-api { server payments-api:8000; }
    upstream payout-api { server payout-api:8000; }
    upstream payout-service-2 { server payout-service-2:8000; }
    upstream payout-consumer { server payout-consumer:8000; }
    upstream orders-service { server orders-service:8000; }
    upstream refund-service { server refund-service:8000; }
    # === end upstreams ===

    # === internal route blocks: deny external (lb) calls to endpoints marked internal ===
    # (service-to-service calls bypass the lb, so they keep working)
    map "$request_method $uri" $internal_block {
        default 0;
        # === internal blocks ===
        # === end internal blocks ===
    }
    # === end internal route blocks ===

    server {
        listen 80;

        # Deny external calls to routes marked internal (see the $internal_block map above).
        if ($internal_block) { return 403; }

        # === locations (one per service) ===
        location /service-1/ {
            proxy_pass http://service-1/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /payments-api/ {
            proxy_pass http://payments-api/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /payout-api/ {
            proxy_pass http://payout-api/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /payout-service-2/ {
            proxy_pass http://payout-service-2/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /payout-consumer/ {
            proxy_pass http://payout-consumer/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /orders-service/ {
            proxy_pass http://orders-service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /refund-service/ {
            proxy_pass http://refund-service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # === end locations ===
    }
}
