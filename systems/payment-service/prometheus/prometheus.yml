global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Scrape each service container DIRECTLY (not through the nginx LB), so the
  # metrics reflect the service itself. `service-1:8000` resolves on the compose
  # network. The job name is the service id, which the manifest's health/metric
  # queries key off of: up{job="service-1"}. "Add service" appends a job here.
  [
    # Service "service-1" — generic FastAPI backend
    { job_name: service-1, static_configs: [ { targets: [ service-1:8000 ] } ] },
    # Database "ledger-db" — added by Add database
    {
        job_name: ledger-db,
        static_configs: [ { targets: [ ledger-db-exporter:9187 ] } ]
      },
    # Database "order-db" — added by Add database
    {
        job_name: order-db,
        static_configs: [ { targets: [ order-db-exporter:9187 ] } ]
      },
    # Event stream "refund-stream" — added by Add event stream
    {
        job_name: refund-stream,
        static_configs: [ { targets: [ refund-stream-exporter:9308 ] } ]
      },
    # Database "ledger-db-cdc" — added by Add CDC
    {
        job_name: ledger-db-cdc,
        static_configs: [ { targets: [ ledger-db-cdc:8000 ] } ]
      },
    # Event stream "payout-stream" — added by Add event stream
    {
        job_name: payout-stream,
        static_configs: [ { targets: [ payout-stream-exporter:9308 ] } ]
      },
    # Service "payout-service-2" — added by Add service
    {
        job_name: payout-service-2,
        static_configs: [ { targets: [ payout-service-2:8000 ] } ]
      },
    # Service "payout-consumer" — added by Add service
    {
        job_name: payout-consumer,
        static_configs: [ { targets: [ payout-consumer:8000 ] } ]
      },
    # Service "orders-service" — added by Add service
    {
        job_name: orders-service,
        static_configs: [ { targets: [ orders-service:8000 ] } ]
      },
    # Service "refund-service" — added by Add service
    {
        job_name: refund-service,
        static_configs: [ { targets: [ refund-service:8000 ] } ]
      }
  ]
