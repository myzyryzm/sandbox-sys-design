# nginx as the load balancer / router in front of the services.
#
# Each service is reached at its own /<service-id>/ prefix, which nginx strips
# before proxying (the trailing slash on proxy_pass), so the browser can call
# e.g. /service-1/health and it lands on service-1's /health. nginx matches the
# longest prefix, so adding more services never collides.
#
# The "Add service" button inserts a new upstream and a new location at the
# markers below — keep the marker comments in place.

events {}

http {
    # === upstreams (one per service; add `server` lines for replicas) ===
    upstream chat-service { server chat-service:8000; }
    upstream llm-worker { server llm-worker:8000; }
    upstream llm-worker-2 { server llm-worker-2:8000; }
    upstream llm-worker-3 { server llm-worker-3:8000; }
    upstream llm-worker-scaler { server llm-worker-scaler:8000; }
    # === end upstreams ===

    server {
        listen 80;

        # === locations (one per service) ===
        location /chat-service/ {
            proxy_pass http://chat-service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /llm-worker/ {
            proxy_pass http://llm-worker/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /llm-worker-2/ {
            proxy_pass http://llm-worker-2/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /llm-worker-3/ {
            proxy_pass http://llm-worker-3/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /llm-worker-scaler/ {
            proxy_pass http://llm-worker-scaler/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # === end locations ===
    }
}
