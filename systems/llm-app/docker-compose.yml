# Self-contained compose file for the `llm-app` system.
# Run from inside systems/llm-app/:  docker compose up --build
#
# Topology: nginx LB  ->  service-1 (generic FastAPI), with Prometheus scraping
# the service directly. service-1 is a generic service (the same shape "Add
# service" creates): it exposes /health and /metrics and is reached through the
# LB at the /service-1/ prefix. More services slot in the same way — each gets
# its own compose service, an nginx /<id>/ route, and a Prometheus scrape job.
#
# Restartable: `docker compose down` then `up` cleanly recreates everything.
# Prometheus data is intentionally NOT persisted.

services:
  lb:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  prometheus:
    image: prom/prometheus:v3.1.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  user-db:
    # PostgreSQL "user-db" — added by Add database
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: sandbox
      POSTGRES_DB: user_db
    volumes:
      - ./user-db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
  user-db-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      DATA_SOURCE_NAME: postgresql://sandbox:sandbox@user-db:5432/user_db?sslmode=disable
    depends_on:
      - user-db
  chat-db:
    # PostgreSQL "chat-db" — added by Add database
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: sandbox
      POSTGRES_DB: chat_db
    volumes:
      - ./chat-db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
  chat-db-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      DATA_SOURCE_NAME: postgresql://sandbox:sandbox@chat-db:5432/chat_db?sslmode=disable
    depends_on:
      - chat-db
  chat-service:
    # Service "chat-service" — added by Add service (generic FastAPI backend)
    build: ./chat-service
