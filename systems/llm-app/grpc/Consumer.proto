syntax = "proto3";

package llmconsumer;

service Consumer {
  rpc UpdateWorkers (UpdateWorkersRequest) returns (UpdateWorkersReply);
  rpc OnChatEvict (OnChatEvictRequest) returns (OnChatEvictReply);
}

message UpdateWorkersRequest {
  repeated WorkerEndpoint workers = 1;
}

message UpdateWorkersReply {
  bool ok = 1;       // true once the local workers list was updated
  int32 count = 2;   // number of workers now registered
}

message OnChatEvictRequest {
  int32 chat_id = 1;
}

message OnChatEvictReply {
  bool ok = 1;
}

message WorkerEndpoint {
  string host = 1;   // worker host
  int32 port = 2;    // worker gRPC port
}
