global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Scrape each service container DIRECTLY (not through the nginx LB), so the
  # metrics reflect the service itself. `service-1:8000` resolves on the compose
  # network. The job name is the service id, which the manifest's health/metric
  # queries key off of: up{job="service-1"}. "Add service" appends a job here.
  [
    # prometheus — self-scrape (Prometheus node on the diagram)
    { job_name: prometheus, static_configs: [ { targets: [ prometheus:9090 ] } ] },
    # Database "user-db" — added by Add database
    {
        job_name: user-db,
        static_configs: [ { targets: [ user-db-exporter:9187 ] } ]
      },
    # Database "chat-db" — added by Add database
    {
        job_name: chat-db,
        static_configs: [ { targets: [ chat-db-exporter:9187 ] } ]
      },
    # Service "chat-service" — added by Add service
    {
        job_name: chat-service,
        static_configs: [ { targets: [ chat-service:8000 ] } ]
      },
    # Event stream "user-messages-stream" — added by Add event stream
    {
        job_name: user-messages-stream,
        static_configs: [ { targets: [ user-messages-stream-exporter:9308 ] } ]
      },
    # Database "chat-db-cdc" — added by Add CDC
    {
        job_name: chat-db-cdc,
        static_configs: [ { targets: [ chat-db-cdc:8000 ] } ]
      },
    # LLM Worker "llm-worker" — custom service type
    { job_name: llm-worker, static_configs: [ { targets: [ llm-worker:8000 ] } ] },
    # Redis "llm-worker-stream" — added by Add service (LLM Worker)
    {
        job_name: llm-worker-stream,
        static_configs: [ { targets: [ llm-worker-stream-exporter:9121 ] } ]
      },
    # Scaler for LLM worker "llm-worker"
    {
        job_name: llm-worker-scaler,
        static_configs: [ { targets: [ llm-worker-scaler:8000 ] } ]
      },
    # Consumer group service "usr-msg-consumer" — custom service type
    {
        job_name: usr-msg-consumer,
        static_configs: [ { targets: [ usr-msg-consumer:8000 ] } ]
      },
    # Scaler for consumer group service "usr-msg-consumer"
    {
        job_name: usr-msg-consumer-scaler,
        static_configs: [ { targets: [ usr-msg-consumer-scaler:8000 ] } ]
      },
    # Service "coordinator" — added by Add service
    {
        job_name: coordinator,
        static_configs: [ { targets: [ coordinator:8000 ] } ]
      },
    # etcd cluster "etcd" — added by Add etcd
    {
        job_name: etcd,
        static_configs: [ { targets: [ etcd-1:2379, etcd-2:2379, etcd-3:2379 ] } ]
      }
  ]
