global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Scrape each service container DIRECTLY (not through the nginx LB), so the
  # metrics reflect the service itself. `service-1:8000` resolves on the compose
  # network. The job name is the service id, which the manifest's health/metric
  # queries key off of: up{job="service-1"}. "Add service" appends a job here.
  [
    # prometheus — self-scrape (Prometheus node on the diagram)
    { job_name: prometheus, static_configs: [ { targets: [ prometheus:9090 ] } ] },
    # Database "user-db" — added by Add database
    {
        job_name: user-db,
        static_configs: [ { targets: [ user-db-exporter:9187 ] } ]
      },
    # Database "chat-db" — added by Add database
    {
        job_name: chat-db,
        static_configs: [ { targets: [ chat-db-exporter:9187 ] } ]
      },
    # Service "chat-service" — added by Add service
    {
        job_name: chat-service,
        static_configs: [ { targets: [ chat-service:8000 ] } ]
      }
  ]
