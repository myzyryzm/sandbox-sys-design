# L4 (tcp) load balancer for websocket tier "ws-lb" — generated by Add WebSockets.
# Regenerated from websockets.json when the tier changes; do not hand-edit the server lines.
global
    log stdout format raw local0

resolvers docker
    nameserver dns1 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry   1s
    hold valid      10s
    hold obsolete   10s

defaults
    mode tcp
    log global
    timeout connect 5s
    timeout client  75s
    timeout server  75s
    timeout tunnel  1h

frontend ws_in
    bind *:8080
    default_backend ws_servers

backend ws_servers
    balance leastconn
    option tcp-check
    server ws-server-1 ws-server-1:8080 check resolvers docker init-addr libc,none
    server ws-server-2 ws-server-2:8080 check resolvers docker init-addr libc,none

# haproxy's built-in prometheus exporter, on its own HTTP frontend.
frontend stats
    mode http
    bind *:8405
    http-request use-service prometheus-exporter if { path /metrics }
