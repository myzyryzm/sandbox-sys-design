# Self-contained compose file for the `hello-lb` system.
# Run from inside systems/hello-lb/:  docker compose up --build
#
# Topology: nginx LB  ->  service-1 (FastAPI), with Prometheus scraping the
# service directly. service-1 is a generic service (the same shape "Add service"
# creates): it exposes /health and /metrics and is reached through the LB at the
# /service-1/ prefix. More services slot in the same way — each gets its own
# compose service, an nginx /<id>/ route, and a Prometheus scrape job.
#
# Restartable: `docker compose down` then `up` cleanly recreates everything.
# Prometheus data is intentionally NOT persisted in Phase 1.

services:
  lb:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  prometheus:
    image: prom/prometheus:v3.1.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
