syntax = "proto3";

package downloadcoordinator;

// ChunkTransfer is served AND consumed by every node (coordinator + workers). A node
// that holds chunk N can serve it to any peer that requests it — this is what turns the
// initial star (everyone pulls from the coordinator) into a mesh (peers seed peers).
service ChunkTransfer {
  // Stream one chunk back as a header frame followed by one or more data frames.
  rpc GetChunk (ChunkRequest) returns (stream ChunkFrame);
}

message ChunkRequest {
  int32 chunk_id = 1;
  string requester_id = 2;
}

// A streamed frame: exactly one header (first) then data frame(s).
message ChunkFrame {
  oneof frame {
    ChunkHeader header = 1;
    bytes data = 2;
  }
}

message ChunkHeader {
  int32 chunk_id = 1;
  int64 size = 2;
  string checksum = 3; // sha256 hex of the full chunk (the receiver verifies before flipping its bitmap)
}
